# All user-visible copy lives here. main.js reads this file and renders.
# When you add new UI strings, put them here — never hard-code them in JS/HTML.
# The brand is "Agent Lock". The CLI / package / lockdir are written `agent-lock`.

meta:
  title: Agent Lock — live multi-agent coding without the merge
  description: >-
    Live multi-agent coding in one shared checkout. No branches, no PRs,
    no merge conflicts. When one agent edits a file, the others see "taken"
    and pick another.

